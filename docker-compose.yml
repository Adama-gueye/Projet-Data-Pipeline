name: dsia-exam-ecommerce

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    _AIRFLOW_WWW_USER_USERNAME: airflow
    _AIRFLOW_WWW_USER_PASSWORD: airflow
    PYTHONPATH: /opt/project
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    WAREHOUSE_HOST: postgres
    WAREHOUSE_PORT: "5432"
    WAREHOUSE_DB: warehouse
    WAREHOUSE_USER: de_user
    WAREHOUSE_PASSWORD: de_password
    MINIO_ENDPOINT: http://minio:9000
    MINIO_ACCESS_KEY: minio
    MINIO_SECRET_KEY: minio123
    MINIO_BUCKET_RAW: raw
    MINIO_BUCKET_ANALYTICS: analytics
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./data:/opt/project/data
    - ./services:/opt/project/services
  depends_on: &airflow-common-depends-on
    airflow-postgres:
      condition: service_healthy
    postgres:
      condition: service_healthy
    minio:
      condition: service_healthy
  user: "${AIRFLOW_UID:-50000}:0"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: warehouse
      POSTGRES_USER: de_user
      POSTGRES_PASSWORD: de_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U de_user -d warehouse"]
      interval: 10s
      timeout: 5s
      retries: 10

  airflow-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minio minio123 &&
      mc mb --ignore-existing local/raw &&
      mc mb --ignore-existing local/analytics &&
      mc anonymous set private local/raw &&
      mc anonymous set private local/analytics
      "

  kafka-ui:
    image: kafbat/kafka-ui:latest
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_KAFKACONNECT: ""
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  marimo-notebook:
    build:
      context: .
      dockerfile: Dockerfile.app
    command: marimo edit notebooks --host 0.0.0.0 --port 3838
    ports:
      - "3838:3838"
    volumes:
      - ./notebooks:/opt/project/notebooks
    environment:
      PYTHONPATH: /opt/project
      WAREHOUSE_HOST: postgres
      WAREHOUSE_PORT: "5432"
      WAREHOUSE_DB: warehouse
      WAREHOUSE_USER: de_user
      WAREHOUSE_PASSWORD: de_password
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  realtime-producer:
    build:
      context: .
      dockerfile: Dockerfile.app
    command: python services/streaming/realtime_orders_producer.py
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_ORDERS: orders_raw
      EMIT_INTERVAL_SECONDS: "2"
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  realtime-consumer:
    build:
      context: .
      dockerfile: Dockerfile.app
    command: python services/streaming/realtime_orders_consumer.py
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_ORDERS: orders_raw
      KAFKA_TOPIC_ANOMALIES: orders_anomalies
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: warehouse
      POSTGRES_USER: de_user
      POSTGRES_PASSWORD: de_password
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  anomaly-consumer:
    build:
      context: .
      dockerfile: Dockerfile.app
    command: python services/streaming/anomaly_consumer.py
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_ANOMALIES: orders_anomalies
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: warehouse
      POSTGRES_USER: de_user
      POSTGRES_PASSWORD: de_password
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /sources/logs /sources/dags
        chown -R "${AIRFLOW_UID:-50000}:0" /sources/logs /sources/dags
        exec /entrypoint airflow version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
    user: "0:0"
    volumes:
      - .:/sources

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data:
  airflow_postgres_data:
  minio_data:
